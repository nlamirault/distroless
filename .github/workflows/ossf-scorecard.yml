# ---
# # yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Scorecard

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  push:
    branches:
    - main
  schedule:
  # Weekly on Saturdays.
  - cron: "30 1 * * 6"

# Declare default permissions as read only.
permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@cb2c11159fc2a8d6411099ac565e2586b76f6204 # v2.10.4
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Run analysis
      uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
      with:
        results_file: results.sarif
        results_format: sarif
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        publish_results: true

    - name: Upload artifact
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd1954910f0fb270230 # v4.6.0
      with:
        name: SARIF file
        path: results.sarif
        retention-days: 5

    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@b56ba49b26b50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
      with:
        sarif_file: results.sarif
