---
name: Reusable release workflow

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      repository:
        description: "Image repository"
        type: string
        required: false
        # default: nlamirault/atoma/${{ github.workflow }}
      tag:
        description: "Image tag"
        type: string
        required: false
        default: "latest"
      config-dir:
        description: "Config directory"
        type: string
        required: false
        # default: images/${{ github.workflow }}
      target:
        description: "Image target"
        type: string
        required: false
        default: "prod"
      archs:
        description: "Architectures"
        type: string
        required: false
        default: "amd64,arm64"
      scan:
        description: "Enable scan"
        type: string
        required: false
        default: "true"
      vex-file:
        description: "Path to the image-specific OpenVEX document (e.g. vex/infra-tools.openvex.json)"
        type: string
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  publish:
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write

    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      registry: ${{ steps.vars.outputs.registry }}
      image: ${{ steps.vars.outputs.image }}

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: 🚚 Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: 🎉 Setup Crane
      uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

    - name: 🎉 Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    # with:
    #   cosign-release: 2.6.1

    - name: 💡 Set Vars
      id: vars
      shell: bash
      run: |
        if [[ "${{ github.ref_name }}" != "main" ]]; then
          # export REGISTRY="ttl.sh"
          export REGISTRY=${{ env.REGISTRY }}
        else
          export REGISTRY=${{ env.REGISTRY }}
        fi
        echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
        echo "image=${REGISTRY}/${{ inputs.repository }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT
        # Debug
        echo "registry=${REGISTRY}"
        echo "image=${REGISTRY}/${{ inputs.repository }}:${{ inputs.tag }}"

    - if: steps.vars.outputs.registry == 'ghcr.io'
      name: 🔓 Login to GitHub Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔧 Create SBOM directory
      id: output
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/sbom

    - name: 🔧 Check for melange.yaml
      id: check-melange
      shell: bash
      run: |
        if [ -f "${{ inputs.config-dir }}/melange.yaml" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - if: steps.check-melange.outputs.exists == 'true'
      name: ✅ Melange
      uses: chainguard-dev/actions/melange-build@e1c4977ad9cb32b12c5b222ec0134a22bec60bd5 # v1.6.25
      with:
        config: ${{ inputs.config-dir }}/melange.yaml
        archs: ${{ inputs.archs }}
        signing-key-path: ${{ github.workspace }}/keys/melange.rsa
        repository-path: ${{ github.workspace }}/packages
        empty-workspace: false
        sign-with-temporary-key: true

    - if: steps.check-melange.outputs.exists == 'true'
      name: ✅ Apko and Melange
      id: apko-melange
      uses: chainguard-images/actions/apko-publish@03241d624cef245ada340d38c1ed42d44e2e15b0 # v1.0.33
      with:
        config: ${{ inputs.config-dir }}/${{ inputs.target }}.yaml
        keyring-append: ${{ github.workspace }}/keys/melange.rsa.pub
        build-repository-append: ${{ github.workspace }}/packages
        tag: ${{ steps.vars.outputs.image }}
        archs: ${{ inputs.archs }}
        sbom-path: ${{ github.workspace }}/sbom

    - if: steps.check-melange.outputs.exists == 'false'
      name: ✅ Apko
      id: apko
      uses: chainguard-images/actions/apko-publish@03241d624cef245ada340d38c1ed42d44e2e15b0 # v1.0.33
      with:
        config: ${{ inputs.config-dir }}/${{ inputs.target }}.yaml
        tag: ${{ steps.vars.outputs.image }}
        archs: ${{ inputs.archs }}
        sbom-path: ${{ github.workspace }}/sbom

    - name: 🔧 Extract digest
      id: digest
      shell: bash
      run: |
        echo "digest=$(crane digest ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
        crane digest ${{ steps.vars.outputs.image }}

        if [[ "${{ inputs.archs }}" == *"amd64"* ]]; then
            echo "digest-amd64=$(crane digest --platform=linux/amd64 ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
            crane digest --platform=linux/amd64 ${{ steps.vars.outputs.image }}
        else
            echo "AMD64 unavailable"
            echo "digest-amd64=''" >> $GITHUB_OUTPUT
        fi
        if [[ "${{ inputs.archs }}" == *"arm64"* ]]; then
            echo "digest-arm64=$(crane digest --platform=linux/arm64 ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
            crane digest --platform=linux/arm64 ${{ steps.vars.outputs.image }}
        else
            echo "ARM64 unavailable"
            echo "digest-arm64=''" >> $GITHUB_OUTPUT
        fi

    - name: 🔓 Sign image
      shell: bash
      env:
        COSIGN_YES: "true"
      run: |
        cosign sign \
          --recursive \
          --use-signing-config=false \
          --oidc-provider=github-actions \
          --oidc-issuer=https://token.actions.githubusercontent.com \
          ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest }}

    - name: 🔓 Attest index SBOM
      shell: bash
      env:
        COSIGN_YES: "true"
      run: |
        cosign attest \
          --type=spdxjson \
          --use-signing-config=false \
          --predicate=${{ github.workspace }}/sbom/sbom-index.spdx.json \
          --oidc-provider=github-actions \
          ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest }}

    - if: steps.digest.outputs.digest-amd64 != ''
      name: 🔓 Attest amd64 SBOM
      shell: bash
      env:
        COSIGN_YES: "true"
      run: |
        cosign attest \
          --type=spdxjson \
          --use-signing-config=false \
          --predicate=${{ github.workspace }}/sbom/sbom-x86_64.spdx.json \
          --oidc-provider=github-actions \
          ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest-amd64 }}

    - if: steps.digest.outputs.digest-arm64 != ''
      name: 🔓 Attest arm64 SBOM
      shell: bash
      env:
        COSIGN_YES: "true"
      run: |
        cosign attest \
          --type=spdxjson \
          --use-signing-config=false \
          --predicate=${{ github.workspace }}/sbom/sbom-aarch64.spdx.json \
          --oidc-provider=github-actions \
          ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest-arm64 }}

    - if: steps.vars.outputs.registry == 'ghcr.io'
      name: 🔓 Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-name: ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}
        subject-digest: ${{ steps.digest.outputs.digest }}
        push-to-registry: true

  slsa:
    permissions:
      actions: read
      id-token: write
      packages: write
    needs: publish
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish.outputs.image }}
      digest: ${{ needs.publish.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  scan:
    if: inputs.scan == 'true'
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    needs: publish
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: 🚚 Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: 🎉 Setup vexctl
      uses: openvex/setup-vexctl@d0cfef7e0264d6fbb83de3ce0a4cb13d61ab9cb2 # v0.1.0

    - name: ✅ Scan image
      id: scan
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      with:
        image: ${{ needs.publish.outputs.image }}
        cache-db: true
        fail-build: "false"
        severity-cutoff: "high"
        output-format: "sarif"

    - name: 🔀 Merge all VEX documents
      id: vex-merge
      shell: bash
      run: |
        shopt -s nullglob
        vex_files=(vex/*.openvex.json)
        shopt -u nullglob
        if [ "${#vex_files[@]}" -eq 0 ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "No VEX files found — skipping merge"
          exit 0
        fi
        echo "skip=false" >> $GITHUB_OUTPUT
        echo "Merging ${#vex_files[@]} VEX file(s): ${vex_files[*]}"
        vexctl merge "${vex_files[@]}" > merged.openvex.json
        echo "merged.openvex.json contents:"
        cat merged.openvex.json

    - name: 🔒 Filter SARIF with VEX
      id: vex-filter
      if: steps.vex-merge.outputs.skip == 'false'
      shell: bash
      run: |
        raw_sarif="${{ steps.scan.outputs.sarif }}"
        filtered_sarif="filtered.sarif"
        # Prefer the image-specific VEX file when provided; fall back to merged.
        if [ -n "${{ inputs.vex-file }}" ] && [ -f "${{ inputs.vex-file }}" ]; then
          vex_doc="${{ inputs.vex-file }}"
          echo "Using image-specific VEX: ${vex_doc}"
        else
          vex_doc="merged.openvex.json"
          echo "Using merged VEX document"
        fi
        vexctl filter "${raw_sarif}" "${vex_doc}" > "${filtered_sarif}"
        raw_count=$(jq '[.runs[].results // [] | length] | add // 0' "${raw_sarif}")
        filtered_count=$(jq '[.runs[].results // [] | length] | add // 0' "${filtered_sarif}")
        suppressed=$((raw_count - filtered_count))
        echo "Raw findings: ${raw_count} | After VEX filter: ${filtered_count} | Suppressed: ${suppressed}"
        echo "sarif=${filtered_sarif}" >> $GITHUB_OUTPUT

    - name: ⬆️ Upload SARIF (VEX-filtered)
      if: steps.vex-merge.outputs.skip == 'false'
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ steps.vex-filter.outputs.sarif }}
        category: ${{ github.workflow }}

    - name: ⬆️ Upload SARIF (raw — no VEX files found)
      if: steps.vex-merge.outputs.skip == 'true'
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: ${{ github.workflow }}
