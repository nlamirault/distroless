---

name: Project / Release

on: # yamllint disable-line rule:truthy
  push:
    branches:
    - main

permissions:
  contents: write         # to push tags and changelog
  issues: write           # (optional) for any issue linkage
  pull-requests: write    # to create/modify the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout Code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Run Release Please Action
      uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0
      id: release
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        target-branch: ${{ github.ref_name }}
        config-file: .github/release-please-config.json
