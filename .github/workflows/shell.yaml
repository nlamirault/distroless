---
name: OCI / Shell snapshot

on: # yamllint disable-line rule:truthy
  schedule:
  - cron: "0 */6 * * *"
  pull_request:
    paths:
    - .github/workflows/shell.yaml
    - "images/shell/*.yaml"
    - "images/shell/**/*.yaml"
  push:
    branches:
    - "main"
    paths:
    - .github/workflows/shell.yaml
    - "images/shell/*.yaml"
    - "images/shell/**/*.yaml"
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:
  publish:
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write

    strategy:
      matrix:
        version: [latest]
        variant: [prod, dev]

    name: ${{ matrix.version }}${{ matrix.variant == 'dev' && '-dev' || '' }}
    uses: "./.github/workflows/release.yaml"
    with:
      repository: nlamirault/atoma/shell
      config-dir: images/shell
      tag: ${{ matrix.version }}${{ matrix.variant == 'dev' && '-dev' || '' }}
      target: ${{ matrix.variant }}
      vex-file: vex/shell.openvex.json
    secrets: inherit
